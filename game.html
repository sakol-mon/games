<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกม Flip Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .category-info {
            font-size: 1.2em;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-item label {
            display: block;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-item span {
            font-size: 1.5em;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            gap: 15px;
            margin: 0 auto;
            width: fit-content;
        }

        .card {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card.matched {
            opacity: 0.5; 
            filter: grayscale(80%); 
            cursor: default;
            pointer-events: none; 
        }

        .card.matched:hover {
            transform: none;
        }

        /* เมื่อการ์ดถูกจับคู่และพลิกแล้ว ให้ด้านหลัง (รูปภาพ) มองเห็นได้เสมอ */
        .card.matched .card-back {
            backface-visibility: visible; 
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* โค้ดนี้คือตัวที่ทำให้ด้านตรงข้ามถูกซ่อนเมื่อพลิก */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-size: 3em;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
            overflow: hidden;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(0,0,0,0.2);
            color: white;
            backdrop-filter: (10px);
        }

        .win-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
            max-width: 90%;
        }

        .win-message.show {
            display: block;
            animation: popup 0.5s ease;
        }

        @keyframes popup {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .win-message h2 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .win-message p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 80px);
                gap: 10px;
            }
            
            .card {
                width: 80px;
                height: 80px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 เกม Flip Card 🎮</h1>
        <div class="category-info" id="categoryInfo">กำลังโหลด...</div>
        <div class="stats">
            <div class="stat-item">
                <label>คู่ที่จับได้:</label>
                <span id="matches">0</span>
            </div>
            <div class="stat-item">
                <label>จำนวนครั้ง:</label>
                <span id="moves">0</span>
            </div>
            <div class="stat-item">
                <label>เวลา:</label>
                <span id="timer">00:00</span>
            </div>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">🔄 เริ่มเกมใหม่</button>
        <button class="btn btn-secondary" onclick="goBack()">← เปลี่ยนเกม</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="win-message" id="winMessage">
        <h2>🎉 ยินดีด้วย! 🎉</h2>
        <p>คุณชนะแล้ว!</p>
        <p id="finalStats"></p>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button class="btn" onclick="resetGame()">เล่นอีกครั้ง</button>
            <button class="btn btn-secondary" onclick="goBack()">เปลี่ยนเกม</button>
        </div>
    </div>

    <script>
        let selectedCategory = null;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval;
        let canFlip = true;

        function loadCategory() {
            const categoryData = localStorage.getItem('selectedCategory');
            
            if (!categoryData) {
                alert('กรุณาเลือกเกมก่อน');
                window.location.href = 'index.html';
                return;
            }

            selectedCategory = JSON.parse(categoryData);
            document.getElementById('categoryInfo').textContent = `เกม: ${selectedCategory.name}`;
            
            initGame();
        }

        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            // สุ่มเรียงภาพและทำซ้ำเป็น 2 ชุด (6 คู่)
            cards = [...selectedCategory.images, ...selectedCategory.images]
                .sort(() => Math.random() - 0.5)
                .map((imagePath, index) => ({
                    id: index,
                    image: imagePath,
                    flipped: false,
                    matched: false
                }));

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;
                
                // หากการ์ดถูกทำเครื่องหมายว่า matched แล้ว ให้คงสถานะ flipped และ matched ไว้
                if (card.matched) {
                    cardElement.classList.add('flipped', 'matched');
                }

                cardElement.innerHTML = `
                    <div class="card-front">❓</div> 
                    <div class="card-back">
                        <img src="${card.image}" alt="Card" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><text x=%2250%%22 y=%2250%%22 font-size=%2240%22 text-anchor=%22middle%22 dy=%22.3em%22>❌</text></svg>';">
                    </div>
                `;
                cardElement.addEventListener('click', () => flipCard(card.id));
                gameBoard.appendChild(cardElement);
            });

            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            canFlip = true;
            
            updateStats();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function flipCard(id) {
            if (!canFlip) return;
            
            const card = cards[id];
            const cardElement = document.querySelector(`[data-id="${id}"]`);
            
            if (card.flipped || card.matched || flippedCards.length === 2) return;

            card.flipped = true;
            cardElement.classList.add('flipped');
            flippedCards.push(id);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [id1, id2] = flippedCards;
            const card1 = cards[id1];
            const card2 = cards[id2];

            setTimeout(() => {
                if (card1.image === card2.image) {
                    // คู่ตรงกัน
                    card1.matched = true;
                    card2.matched = true;
                    
                    const cardElement1 = document.querySelector(`[data-id="${id1}"]`);
                    const cardElement2 = document.querySelector(`[data-id="${id2}"]`);
                    
                    // 🚨 การแก้ไข: เพิ่ม .flipped กลับมาเพื่อให้การ์ดคงสถานะพลิก (แสดงรูปภาพ)
                    cardElement1.classList.add('flipped'); 
                    cardElement2.classList.add('flipped');
                    
                    // เพิ่มคลาส 'matched' เพื่อใส่สไตล์ dim/grayscale บนรูปภาพที่แสดง
                    cardElement1.classList.add('matched');
                    cardElement2.classList.add('matched');
                    
                    matchedPairs++;
                    updateStats();

                    if (matchedPairs === 6) {
                        endGame();
                    }
                } else {
                    // คู่ไม่ตรงกัน: พลิกกลับ
                    card1.flipped = false;
                    card2.flipped = false;
                    document.querySelector(`[data-id="${id1}"]`).classList.remove('flipped');
                    document.querySelector(`[data-id="${id2}"]`).classList.remove('flipped');
                }

                flippedCards = [];
                canFlip = true;
            }, 1000);
        }

        function updateStats() {
            document.getElementById('matches').textContent = matchedPairs;
            document.getElementById('moves').textContent = moves;
        }

        function updateTimer() {
            timer++;
            const minutes = Math.floor(timer / 60).toString().padStart(2, '0');
            const seconds = (timer % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${seconds}`;
        }

        function endGame() {
            clearInterval(timerInterval);
            const minutes = Math.floor(timer / 60);
            const seconds = timer % 60;
            
            document.getElementById('finalStats').innerHTML = `
                เวลาที่ใช้: ${minutes} นาที ${seconds} วินาที<br>
                จำนวนครั้งที่พลิก: ${moves} ครั้ง
            `;
            
            document.getElementById('overlay').classList.add('show');
            document.getElementById('winMessage').classList.add('show');
        }

        function resetGame() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('winMessage').classList.remove('show');
            clearInterval(timerInterval);
            initGame();
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // โหลดหมวดหมู่เมื่อเปิดหน้า
        loadCategory();
    </script>
</body>
</html>
